services:
  - type: web
    name: predi_stock
    env: python
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # Set NEWSAPI_KEY in the Render dashboard (Environment); do not commit secrets.
      - key: NEWSAPI_KEY
        sync: false
